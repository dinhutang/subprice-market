<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subprice Market</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:white;margin:0}
.header{background:#ee4d2d;padding:15px;text-align:center;font-weight:bold}
.container{padding:15px;max-width:600px;margin:auto}
.card{background:#1c1c1c;padding:15px;border-radius:12px;margin-bottom:10px}
input,textarea{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
button{width:100%;padding:12px;margin-top:10px;background:#25D366;border:none;border-radius:8px;font-weight:bold}
.product{background:#222;padding:10px;margin-top:10px;border-radius:8px}
</style>
</head>

<body>

<div class="header">🛒 SUBPRICE MARKET</div>

<div class="container">

<div class="card">
<h3>➕ Submit Produk</h3>

<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<input id="daerah" placeholder="Daerah">
<input id="whatsapp" placeholder="WhatsApp">
<textarea id="desc" placeholder="Description"></textarea>

<button onclick="submitProduk()">Submit</button>
</div>

<div class="card">
<button onclick="loadData()">📦 Load Produk</button>
</div>

<div id="list"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxw1ssd7FQve44TKq_xnrKejngWHondPe1IKB8yAlYYPJ2CqVGY5a0nGPghRhlpCWuq/exec";

// SUBMIT
function submitProduk(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
nama:document.getElementById("nama").value,
harga:document.getElementById("harga").value,
daerah:document.getElementById("daerah").value,
whatsapp:document.getElementById("whatsapp").value,
desc:document.getElementById("desc").value
})
}).then(()=>alert("Berjaya submit!"));

}

// LOAD
async function loadData(){

let res = await fetch(API_URL);
let data = await res.json();

let list = document.getElementById("list");
list.innerHTML="";

for(let i=1;i<data.length;i++){
list.innerHTML += `
<div class="product">
<b>${data[i][1]}</b><br>
RM ${data[i][2]}<br>
📍 ${data[i][3]}<br>
📞 ${data[i][4]}<br>
</div>`;
}
}

</script>

</body>
</html>
