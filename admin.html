<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:#fff;
}

.header{
    background:#222;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:15px;
}

.card{
    background:#1c1c1c;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button{
    padding:10px;
    margin:5px 5px 0 0;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}

.badge{
    padding:3px 8px;
    background:#333;
    border-radius:8px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="header">ADMIN PANEL SYSTEM</div>

<div class="container">

<button onclick="loadData()">LOAD DATA</button>

<div id="list"></div>

</div>

<script>

const API_URL = "PASTE_WEB_APP_URL_KAU_DI_SINI";

function loadData(){

fetch(API_URL)
.then(res => res.json())
.then(data => {

let list = document.getElementById("list");
list.innerHTML = "";

// start dari 1 (skip header)
for(let i = 1; i < data.length; i++){

list.innerHTML += `
<div class="card">
<b>${data[i][1]}</b><br>
💰 RM ${data[i][2]}<br>
📍 ${data[i][3]}<br>
📞 ${data[i][4]}<br>
📝 ${data[i][5]}<br>

<span class="badge">${data[i][6] || "PENDING"}</span><br><br>

<button class="approve" onclick="updateStatus(${i}, 'APPROVED')">APPROVE</button>
<button class="reject" onclick="updateStatus(${i}, 'REJECTED')">REJECT</button>
</div>
`;
}

});

}

function updateStatus(row, status){

fetch(API_URL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
action: "updateStatus",
row: row,
status: status
})
})
.then(res => res.text())
.then(() => {
loadData();
});

}

</script>

</body>
</html>
