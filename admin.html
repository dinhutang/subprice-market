<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0}
.header{padding:15px;background:#222;text-align:center}
.container{padding:15px;max-width:900px;margin:auto}
.card{background:#1c1c1c;padding:15px;margin-bottom:10px;border-radius:10px}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.approve{background:green;color:#fff}
.reject{background:red;color:#fff}
</style>
</head>

<body>

<div class="header">ADMIN PANEL V2</div>

<div class="container">

<button onclick="loadData()">LOAD DATA</button>

<div id="list"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyOKBQWZZt6xRVBQ6f2YfLfcyYpvTI5zV7IaSCHAhawXPT8Qq49fwOs4lmCVH5v5TOi/exec";

async function loadData(){
  try {
    let res = await fetch(API_URL);
    let data = await res.json();

    let list = document.getElementById("list");
    list.innerHTML = "";

    for(let i = 1; i < data.length; i++){

      list.innerHTML += `
      <div class="card">
        <b>${data[i][1]}</b><br>
        💰 RM ${data[i][2]}<br>
        📍 ${data[i][3]}<br>
        📞 ${data[i][4]}<br>
        📝 ${data[i][5]}<br>
        <b>Status:</b> ${data[i][6]}<br><br>

        <button class="approve" onclick="updateStatus(${i},'APPROVED')">APPROVE</button>
        <button class="reject" onclick="updateStatus(${i},'REJECTED')">REJECT</button>
      </div>
      `;
    }

  } catch(err){
    alert("ERROR LOAD DATA: " + err);
    console.log(err);
  }
}

async function updateStatus(row,status){

  try {
    let res = await fetch(API_URL, {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        action:"updateStatus",
        row:row,
        status:status
      })
    });

    let text = await res.text();
    console.log(text);

    loadData();

  } catch(err){
    alert("ERROR UPDATE: " + err);
    console.log(err);
  }
}

</script>

</body>
</html>
